name: CI/CD — Deploy a Firebase (PR Preview)

on: pull_request

permissions:
  checks: write
  contents: read
  pull-requests: write

concurrency:
  group: cd-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ─── 1. Calidad ──────────────────────────────────────────────
  quality:
    name: Analyze · Format · Test
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Instalar dependencias
        run: flutter pub get

      - name: Verificar formato de código
        run: dart format --output=none --set-exit-if-changed .

      - name: Analizar código
        run: flutter analyze

      - name: Ejecutar tests
        run: flutter test --coverage

  # ─── 2. Build & Preview ──────────────────────────────────────
  preview:
    name: Build · Deploy → Preview
    needs: quality
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Instalar dependencias
        run: flutter pub get

      - name: Generar código (Freezed · Injectable)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Web (release)
        run: flutter build web --release

      - name: Deploy a Firebase Hosting (preview)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BTG_FUNDS }}
          projectId: btg-funds
