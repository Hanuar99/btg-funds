name: CI — Calidad de código

# Corre en TODAS las ramas y PRs (incluyendo forks).
# No requiere secretos — solo análisis, formato y tests.
on:
  push:
    branches:
      - '**'
    paths-ignore:
      - '**.md'
      - 'assets/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'assets/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Analyze · Format · Test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Instalar dependencias
        run: flutter pub get

      - name: Generar código (Freezed · Injectable)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verificar formato de código
        run: dart format --output=none --set-exit-if-changed .

      - name: Analizar código
        run: flutter analyze --no-fatal-infos

      - name: Ejecutar tests con cobertura
        run: flutter test --coverage

      - name: Subir reporte de cobertura
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
