name: CD — Deploy a Firebase (Producción)

# Se dispara cuando el CI termina exitosamente en main.
# No repite los checks de calidad — ya los hizo el CI.
on:
  workflow_run:
    workflows: ["CI — Calidad de código"]
    branches: [main]
    types: [completed]

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build · Deploy → Producción
    # Solo corre si el CI pasó
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Instalar dependencias
        run: flutter pub get

      - name: Generar código (Freezed · Injectable)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Web (release)
        run: flutter build web --release

      - name: Deploy a Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BTG_FUNDS }}
          channelId: live
          projectId: btg-funds
